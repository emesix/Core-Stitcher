services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - STITCH_DB_URL=sqlite:///data/stitch.db
    volumes:
      - stitch-data:/app/data
      - ./topologies:/app/topologies:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/livez')"]
      interval: 30s
      timeout: 5s
      retries: 3

  lite:
    build: .
    command: ["python", "-m", "stitch.apps.lite.app", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    environment:
      - STITCH_SERVER=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  web:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  stitch-data:

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stitch Lite{% if subtitle %} — {{ subtitle }}{% endif %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Stitch</div>
        <a href="/devices" {% if active == 'devices' %}class="active"{% endif %}>Devices</a>
        <a href="/topology" {% if active == 'topology' %}class="active"{% endif %}>Topology</a>
        <a href="/runs" {% if active == 'runs' %}class="active"{% endif %}>Runs</a>
        <a href="/preflight" {% if active == 'preflight' %}class="active"{% endif %}>Preflight</a>
        <a href="/system" {% if active == 'system' %}class="active"{% endif %}>System</a>
    </nav>
    <main>
        {% if flash %}
        <div class="flash {{ flash.type }}">{{ flash.message }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    <footer>Stitch Lite — operator rescue UI</footer>
</body>
</html>
